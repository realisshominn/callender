<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anti-Gravity Workspace (Enhanced)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { black: '#0a0a0a', orange: '#ff6b00', orangeDark: '#cc5500' }
          },
          animation: {
            'float-slow': 'float 6s ease-in-out infinite',
            'float-medium': 'float 5s ease-in-out infinite',
            'float-fast': 'float 4s ease-in-out infinite',
            'ring-pulse': 'ringGlow 2s infinite',
            'fade-in': 'fadeInUp 0.3s ease-out forwards'
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            ringGlow: {
              '0%': { boxShadow: '0 0 0 0 rgba(255, 107, 0, 0.7)' },
              '70%': { boxShadow: '0 0 0 10px rgba(255, 107, 0, 0)' },
              '100%': { boxShadow: '0 0 0 0 rgba(255, 107, 0, 0)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    };
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { 
      background-color: #0a0a0a; 
      color: white; 
      overflow-x: hidden; 
    }
    .glass-card {
      background: rgba(255, 107, 0, 0.03); 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 107, 0, 0.15); 
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }
    .glass-card:hover { /* Global hover fallback but overridden in specific components */
      background: rgba(255, 107, 0, 0.05);
      border: 1px solid rgba(255, 107, 0, 0.35);
      box-shadow: 0 8px 32px 0 rgba(255, 107, 0, 0.1);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icons ---
    const WeatherIcon = () => (
      <svg className="w-12 h-12 text-brand-orange drop-shadow-[0_0_15px_rgba(255,107,0,0.6)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    );

    const TrendingUpIcon = () => (
      <svg className="w-4 h-4 text-brand-orange ml-1 z-10 drop-shadow-[0_0_5px_rgba(255,107,0,0.8)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
      </svg>
    );

    const TrendingDownIcon = () => (
      <svg className="w-4 h-4 text-gray-500 ml-1 z-10 relative" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" />
      </svg>
    );

    // --- New Components ---
    const Sparkline = ({ data, color, className="" }) => {
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const padding = 2;
      const height = 30; // SVG height logic
      const width = 100;
      
      const points = data.map((d, i) => {
        const x = (i / (data.length - 1)) * width;
        const y = height - ((d - min) / range) * (height - padding * 2) - padding;
        return `${x},${y}`;
      }).join(' ');

      return (
        <svg width="100%" height="100%" viewBox="0 0 100 30" preserveAspectRatio="none" className={`overflow-visible ${className}`}>
          <polyline fill="none" stroke={color} strokeWidth="3" points={points} className="opacity-40 blur-[4px]" strokeLinecap="round" strokeLinejoin="round" />
          <polyline fill="none" stroke={color} strokeWidth="1.5" points={points} strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );
    };

    const LiveClock = () => {
      const [time, setTime] = useState(new Date());
      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);
      
      return (
        <div className="flex flex-col items-end transform transition-all">
          <div className="text-3xl font-light tracking-widest text-[#FFF] drop-shadow-[0_0_10px_rgba(255,255,255,0.2)] whitespace-nowrap">
            {time.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
          </div>
          <div className="text-[10px] font-medium text-brand-orange mt-0.5 uppercase tracking-[0.2em] opacity-80">
            {time.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}
          </div>
        </div>
      );
    };

    const MemoModal = ({ isOpen, date, initialMemo, onClose, onSave }) => {
      const [text, setText] = useState("");
      
      useEffect(() => {
        if (isOpen) setText(initialMemo || "");
      }, [isOpen, initialMemo]);

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in" style={{ animationDuration: '0.2s' }}>
          {/* Backdrop */}
          <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={onClose}></div>
          
          {/* Modal Content */}
          <div className="glass-card bg-[#0a0a0a]/90 rounded-2xl w-full max-w-sm p-6 border border-brand-orange/40 relative z-10 shadow-[0_0_40px_rgba(255,107,0,0.2)]">
            <h3 className="text-brand-orange mb-4 font-semibold text-lg flex items-center gap-2">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
              March {date}, 2026
            </h3>
            <textarea 
              value={text}
              onChange={(e) => setText(e.target.value)}
              className="w-full h-32 bg-black/50 border border-brand-orange/20 rounded-xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-brand-orange/80 resize-none mb-5 font-light"
              placeholder="Enter your schedule or memo..."
              autoFocus
            ></textarea>
            <div className="flex justify-end gap-3">
              <button onClick={onClose} className="px-5 py-2 rounded-xl text-gray-400 font-medium hover:text-white hover:bg-white/5 transition-colors">Cancel</button>
              <button 
                onClick={() => onSave(text)} 
                className="px-5 py-2 rounded-xl bg-brand-orange text-black font-semibold hover:bg-[#ff8533] transition-all shadow-[0_0_15px_rgba(255,107,0,0.3)] hover:shadow-[0_0_20px_rgba(255,107,0,0.6)]"
              >
                Save Memo
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- Weather Card ---
    const WeatherCard = () => (
      <div className="glass-card rounded-3xl p-6 animate-float-medium flex flex-col justify-between h-[280px] transition-all duration-500 hover:-translate-y-1">
        <div className="flex justify-between items-start">
          <WeatherIcon />
          <LiveClock />
        </div>
        <div className="mt-4">
          <h3 className="text-gray-400 text-xs tracking-widest font-medium mb-1">SEOUL, KOR</h3>
          <div className="flex items-end gap-3">
            <div className="text-5xl font-light tracking-tighter text-white">24<span className="text-2xl align-top text-gray-400">°C</span></div>
            <p className="text-brand-orange font-medium tracking-wide pb-1">Clear / Sunny</p>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-4 mt-6 pt-5 border-t border-brand-orange/10">
          <div>
            <div className="text-[10px] text-gray-500 mb-1 uppercase tracking-widest">Precipitation</div>
            <div className="text-base font-medium text-white">0%</div>
          </div>
          <div>
            <div className="text-[10px] text-gray-500 mb-1 uppercase tracking-widest">Air Quality</div>
            <div className="text-base font-medium text-white">Good</div>
          </div>
        </div>
      </div>
    );

    // --- Finance Card ---
    const FinanceCard = () => {
      // Mock Data 
      const kospiData = [2580, 2590, 2605, 2610, 2600, 2620, 2642.3];
      const sp500Data = [5080, 5090, 5075, 5100, 5110, 5095, 5123.69];
      const usdKrwData = [1335, 1332, 1334, 1338, 1333, 1331, 1330.5];

      return (
        <div className="glass-card rounded-3xl p-6 animate-float-fast flex flex-col justify-between h-[280px] transition-all duration-500 hover:-translate-y-1">
          <h3 className="text-gray-400 text-sm tracking-widest font-medium mb-3">MARKETS</h3>
          <div className="space-y-4 flex-1 flex flex-col justify-center">
            
            {/* KOSPI */}
            <div className="flex justify-between items-center pb-3 border-b border-brand-orange/10 relative group">
              <div className="z-10 bg-gradient-to-r from-[#0a0a0a]/90 to-transparent pr-4">
                <div className="text-sm font-medium text-white">KOSPI</div>
                <div className="text-[10px] text-brand-orange/70">Seoul</div>
              </div>
              <div className="absolute inset-x-12 inset-y-1 opacity-50 transition-opacity duration-300 group-hover:opacity-100 mix-blend-screen">
                <Sparkline data={kospiData} color="#ff6b00" />
              </div>
              <div className="text-right z-10 pl-4 bg-gradient-to-l from-[#0a0a0a]/90 to-transparent">
                <div className="text-lg font-medium text-white">2,642.30</div>
                <div className="text-[11px] text-brand-orange flex items-center justify-end font-semibold">+1.24% <TrendingUpIcon /></div>
              </div>
            </div>

            {/* S&P 500 */}
            <div className="flex justify-between items-center pb-3 border-b border-brand-orange/10 relative group">
              <div className="z-10 bg-gradient-to-r from-[#0a0a0a]/90 to-transparent pr-4">
                <div className="text-sm font-medium text-white">S&P 500</div>
                <div className="text-[10px] text-brand-orange/70">New York</div>
              </div>
              <div className="absolute inset-x-12 inset-y-1 opacity-50 transition-opacity duration-300 group-hover:opacity-100 mix-blend-screen">
                <Sparkline data={sp500Data} color="#ff6b00" />
              </div>
              <div className="text-right z-10 pl-4 bg-gradient-to-l from-[#0a0a0a]/90 to-transparent">
                <div className="text-lg font-medium text-white">5,123.69</div>
                <div className="text-[11px] text-brand-orange flex items-center justify-end font-semibold">+0.80% <TrendingUpIcon /></div>
              </div>
            </div>

            {/* USD/KRW */}
            <div className="flex justify-between items-center bg-white/5 p-3 rounded-xl -mx-2 relative group mt-1">
              <div className="z-10 pr-4 bg-gradient-to-r from-[#111] to-transparent">
                <div className="text-sm font-medium text-white">USD/KRW</div>
                <div className="text-[10px] text-gray-400">Exchange</div>
              </div>
              <div className="absolute inset-x-16 inset-y-2 opacity-30 transition-opacity duration-300 group-hover:opacity-60 mix-blend-screen">
                <Sparkline data={usdKrwData} color="#888" className="filter grayscale" />
              </div>
              <div className="text-right z-10 pl-4 bg-gradient-to-l from-[#111] to-transparent">
                <div className="text-lg font-medium text-gray-300">1,330.50</div>
                <div className="text-[11px] text-gray-400 flex items-center justify-end">-0.15% <TrendingDownIcon /></div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    // --- Calendar Card ---
    const CalendarCard = () => {
      const days = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
      const dates = Array.from({ length: 31 }, (_, i) => i + 1);
      
      const [memos, setMemos] = useState(() => {
        const saved = localStorage.getItem('ag_memos');
        return saved ? JSON.parse(saved) : {};
      });

      useEffect(() => {
        localStorage.setItem('ag_memos', JSON.stringify(memos));
      }, [memos]);

      const [modalOpen, setModalOpen] = useState(false);
      const [selectedDate, setSelectedDate] = useState(null);

      const handleDayClick = (date) => {
        setSelectedDate(date);
        setModalOpen(true);
      };

      const handleSaveMemo = (text) => {
        setMemos(prev => {
          const next = { ...prev };
          if (!text.trim()) {
            delete next[selectedDate];
          } else {
            next[selectedDate] = text;
          }
          return next;
        });
        setModalOpen(false);
      };
      
      return (
        <div className="glass-card rounded-3xl p-8 animate-float-slow col-span-1 md:col-span-2 mt-4 transition-all duration-500 relative">
          <div className="flex justify-between items-end mb-8 relative z-20">
            <h3 className="text-2xl font-light tracking-wide text-brand-orange drop-shadow-[0_0_8px_rgba(255,107,0,0.3)]">MARCH <span className="text-gray-600">2026</span></h3>
            <div className="flex gap-4 text-xs font-medium uppercase tracking-wider text-gray-400">
              <span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-brand-orange shadow-[0_0_8px_#ff6b00]"></span> Memo/Deadline</span>
              <span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-gray-600"></span> Meeting</span>
            </div>
          </div>
          
          <div className="grid grid-cols-7 gap-y-6 gap-x-2 text-center relative z-20">
            {/* Day Headers */}
            {days.map(d => (
              <div key={d} className="text-xs text-brand-orange/50 font-medium tracking-widest mb-2">{d}</div>
            ))}
            
            <div className="col-span-1"></div> {/* Empty slot for March 1st */}
            
            {dates.map(date => {
              const isToday = date === 12; // Example today
              const hasMeeting = date === 5 || date === 14;
              const hasMemo = !!memos[date];
              
              return (
                <div 
                  key={date} 
                  onClick={() => handleDayClick(date)}
                  className="relative flex justify-center items-center h-12 w-full mx-auto max-w-[48px] group cursor-pointer"
                  title={memos[date] ? `Memo: ${memos[date]}` : 'Click to add memo'}
                >
                  {/* The number */}
                  <span className={`text-lg font-medium z-10 transition-colors duration-300 ${isToday ? 'text-brand-orange drop-shadow-[0_0_5px_rgba(255,107,0,0.5)]' : 'text-gray-400'} group-hover:text-white`}>
                    {date}
                  </span>
                  
                  {/* Hover background */}
                  <div className="absolute inset-0 m-auto w-[42px] h-[42px] bg-white/5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300 scale-90 group-hover:scale-100"></div>

                  {/* Today Ring */}
                  {isToday && (
                    <div className="absolute inset-0 m-auto w-[42px] h-[42px] border border-brand-orange rounded-full animate-ring-pulse shadow-[inset_0_0_10px_rgba(255,107,0,0.2)]"></div>
                  )}
                  
                  {/* Indicators below the number */}
                  <div className="absolute -bottom-1.5 left-0 right-0 mx-auto flex justify-center gap-1.5 z-20 transition-transform group-hover:translate-y-1">
                    {hasMemo && <div className="w-1.5 h-1.5 rounded-full bg-brand-orange shadow-[0_0_5px_#ff6b00]"></div>}
                    {hasMeeting && <div className="w-1.5 h-1.5 rounded-full bg-gray-600"></div>}
                  </div>
                </div>
              );
            })}
          </div>
          
          {/* Subtle background element inside card */}
          <div className="absolute top-0 right-0 w-48 h-48 bg-brand-orange/5 blur-3xl rounded-full z-10 pointer-events-none"></div>

          {/* Edit Memo Modal */}
          <MemoModal 
            isOpen={modalOpen} 
            date={selectedDate} 
            initialMemo={selectedDate ? memos[selectedDate] : ""} 
            onClose={() => setModalOpen(false)} 
            onSave={handleSaveMemo} 
          />
        </div>
      );
    };

    // --- Main App ---
    const App = () => {
      const [mounted, setMounted] = useState(false);
      
      useEffect(() => {
        setMounted(true);
        // Force the page to scroll to top smoothly on load
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, []);

      if (!mounted) return null;

      return (
        <div className="min-h-screen p-6 md:p-12 lg:p-20 relative overflow-hidden animate-fade-in opacity-0">
          
          {/* Ambient Background Glows */}
          <div className="absolute -top-32 -left-32 w-96 h-96 bg-brand-orange rounded-full mix-blend-screen filter blur-[180px] opacity-[0.08] pointer-events-none"></div>
          <div className="absolute bottom-0 right-0 w-[500px] h-[500px] bg-brand-orange rounded-full mix-blend-screen filter blur-[200px] opacity-[0.05] pointer-events-none translate-x-1/4 translate-y-1/4"></div>
          
          <div className="max-w-5xl mx-auto relative z-10 transition-all duration-1000">
            {/* Header */}
            <header className="flex items-center gap-5 mb-14 drop-shadow-xl border-b border-brand-orange/10 pb-6">
              <div className="w-14 h-14 glass-card rounded-2xl flex items-center justify-center border-brand-orange/30">
                <div className="w-4 h-4 border-2 border-brand-orange rounded-full shadow-[0_0_15px_#ff6b00] relative">
                  <div className="absolute inset-0 bg-brand-orange animate-ping rounded-full opacity-75"></div>
                </div>
              </div>
              <div>
                <h1 className="text-3xl font-light tracking-wide text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.1)]">Anti-Gravity Workspace</h1>
                <p className="text-brand-orange/70 font-mono tracking-widest text-xs mt-1 uppercase">System Online • Connection Stable</p>
              </div>
            </header>
            
            {/* Grid Layout */}
            <main className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
              <WeatherCard />
              <FinanceCard />
              <CalendarCard />
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
