<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anti-Gravity Workspace (Black & Orange)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { black: '#0a0a0a', orange: '#ff6b00', orangeDark: '#cc5500' }
          },
          animation: {
            'float-slow': 'float 6s ease-in-out infinite',
            'float-medium': 'float 5s ease-in-out infinite',
            'float-fast': 'float 4s ease-in-out infinite',
            'ring-pulse': 'ringGlow 2s infinite',
            'fade-in': 'fadeInUp 1s ease-out forwards'
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            ringGlow: {
              '0%': { boxShadow: '0 0 0 0 rgba(255, 107, 0, 0.7)' },
              '70%': { boxShadow: '0 0 0 10px rgba(255, 107, 0, 0)' },
              '100%': { boxShadow: '0 0 0 0 rgba(255, 107, 0, 0)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    };
  </script>

  <!-- React & Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom CSS for Glassmorphism -->
  <style>
    body { 
      background-color: #0a0a0a; 
      color: white; 
      overflow-x: hidden; 
    }
    .glass-card {
      background: rgba(255, 107, 0, 0.03); /* Subtle orange tint */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 107, 0, 0.15); /* Orange border */
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }
    .glass-card:hover {
      background: rgba(255, 107, 0, 0.05);
      border: 1px solid rgba(255, 107, 0, 0.35);
      box-shadow: 0 8px 32px 0 rgba(255, 107, 0, 0.1);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icons ---
    const WeatherIcon = () => (
      <svg className="w-16 h-16 text-brand-orange drop-shadow-[0_0_15px_rgba(255,107,0,0.6)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    );

    const TrendingUpIcon = () => (
      <svg className="w-5 h-5 text-brand-orange ml-1 drop-shadow-[0_0_5px_rgba(255,107,0,0.8)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
      </svg>
    );

    const TrendingDownIcon = () => (
      <svg className="w-5 h-5 text-gray-500 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" />
      </svg>
    );

    // --- Components ---
    const WeatherCard = () => (
      <div className="glass-card rounded-3xl p-6 animate-float-medium flex flex-col justify-between h-[250px] transition-all duration-500">
        <div className="flex justify-between items-start">
          <div>
            <h3 className="text-gray-400 text-sm tracking-widest font-medium mb-1">WEATHER / SEOUL</h3>
            <div className="text-5xl font-light tracking-tighter text-white">24<span className="text-2xl align-top text-gray-400">°C</span></div>
            <p className="text-brand-orange mt-2 font-medium tracking-wide">Clear / Sunny</p>
          </div>
          <WeatherIcon />
        </div>
        <div className="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-brand-orange/10">
          <div>
            <div className="text-xs text-gray-500 mb-1 uppercase tracking-wider">Precipitation</div>
            <div className="text-lg font-medium text-white">0%</div>
          </div>
          <div>
            <div className="text-xs text-gray-500 mb-1 uppercase tracking-wider">Air Quality</div>
            <div className="text-lg font-medium text-white">Good</div>
          </div>
        </div>
      </div>
    );

    const FinanceCard = () => (
      <div className="glass-card rounded-3xl p-6 animate-float-fast flex flex-col justify-between h-[250px] transition-all duration-500">
        <h3 className="text-gray-400 text-sm tracking-widest font-medium mb-4">MARKETS</h3>
        <div className="space-y-4">
          <div className="flex justify-between items-center pb-2 border-b border-brand-orange/10">
            <div>
              <div className="text-sm font-medium text-white">KOSPI</div>
              <div className="text-xs text-brand-orange/70">Seoul</div>
            </div>
            <div className="text-right">
              <div className="text-lg font-medium text-white">2,642.30</div>
              <div className="text-sm text-brand-orange flex items-center justify-end font-semibold">+1.24% <TrendingUpIcon /></div>
            </div>
          </div>
          <div className="flex justify-between items-center pb-2 border-b border-brand-orange/10">
            <div>
              <div className="text-sm font-medium text-white">S&P 500</div>
              <div className="text-xs text-brand-orange/70">New York</div>
            </div>
            <div className="text-right">
              <div className="text-lg font-medium text-white">5,123.69</div>
              <div className="text-sm text-brand-orange flex items-center justify-end font-semibold">+0.80% <TrendingUpIcon /></div>
            </div>
          </div>
          <div className="flex justify-between items-center bg-black/20 p-2 rounded-xl -mx-2">
            <div className="pl-2">
              <div className="text-sm font-medium text-white">USD/KRW</div>
              <div className="text-xs text-gray-500">Exchange Rate</div>
            </div>
            <div className="text-right pr-2">
              <div className="text-lg font-medium text-gray-300">1,330.50</div>
              <div className="text-sm text-gray-500 flex items-center justify-end">-0.15% <TrendingDownIcon /></div>
            </div>
          </div>
        </div>
      </div>
    );

    const CalendarCard = () => {
      // Dummy calendar data for March 2026
      const days = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
      const dates = Array.from({ length: 31 }, (_, i) => i + 1);
      
      return (
        <div className="glass-card rounded-3xl p-8 animate-float-slow col-span-1 md:col-span-2 mt-4 transition-all duration-500">
          <div className="flex justify-between items-end mb-8 relative z-20">
            <h3 className="text-2xl font-light tracking-wide text-brand-orange">MARCH <span className="text-gray-600">2026</span></h3>
            <div className="flex gap-4 text-xs font-medium uppercase tracking-wider text-gray-400">
              <span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-brand-orange shadow-[0_0_8px_#ff6b00]"></span> Deadline</span>
              <span className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-gray-600"></span> Meeting</span>
            </div>
          </div>
          
          <div className="grid grid-cols-7 gap-y-6 gap-x-2 text-center relative z-20">
            {/* Day Headers */}
            {days.map(d => (
              <div key={d} className="text-xs text-brand-orange/50 font-medium tracking-widest mb-2">{d}</div>
            ))}
            
            <div className="col-span-1"></div> {/* Empty slot for March 1st starting on Monday */}
            
            {dates.map(date => {
              const isToday = date === 12; // Example today
              const hasDeadline = date === 18 || date === 25;
              const hasMeeting = date === 5 || date === 14;
              
              return (
                <div key={date} className="relative flex justify-center items-center h-12 w-full mx-auto max-w-[48px]">
                  {/* The number */}
                  <span className={`text-lg font-medium z-10 transition-colors duration-300 ${isToday ? 'text-brand-orange' : 'text-gray-400'} ${hasDeadline || hasMeeting ? 'hover:text-white cursor-pointer' : ''}`}>
                    {date}
                  </span>
                  
                  {/* Today Ring */}
                  {isToday && (
                    <div className="absolute inset-0 m-auto w-[42px] h-[42px] border border-brand-orange rounded-full animate-ring-pulse shadow-[inset_0_0_10px_rgba(255,107,0,0.2)]"></div>
                  )}
                  
                  {/* Indicators below the number */}
                  <div className="absolute -bottom-1 left-0 right-0 mx-auto flex justify-center gap-1.5">
                    {hasDeadline && <div className="w-1.5 h-1.5 rounded-full bg-brand-orange shadow-[0_0_5px_#ff6b00]"></div>}
                    {hasMeeting && <div className="w-1.5 h-1.5 rounded-full bg-gray-600"></div>}
                  </div>
                </div>
              );
            })}
          </div>
          
          {/* Subtle background element inside card */}
          <div className="absolute top-0 right-0 w-48 h-48 bg-brand-orange/5 blur-3xl rounded-full z-10 pointer-events-none"></div>
        </div>
      );
    };

    const App = () => {
      const [mounted, setMounted] = useState(false);
      
      useEffect(() => {
        setMounted(true);
      }, []);

      if (!mounted) return null;

      return (
        <div className="min-h-screen p-6 md:p-12 lg:p-20 relative overflow-hidden animate-fade-in opacity-0">
          
          {/* Ambient Background Glows */}
          <div className="absolute -top-32 -left-32 w-96 h-96 bg-brand-orange rounded-full mix-blend-screen filter blur-[180px] opacity-[0.08] pointer-events-none"></div>
          <div className="absolute bottom-0 right-0 w-[500px] h-[500px] bg-brand-orange rounded-full mix-blend-screen filter blur-[200px] opacity-[0.05] pointer-events-none translate-x-1/4 translate-y-1/4"></div>
          
          <div className="max-w-5xl mx-auto relative z-10">
            {/* Header */}
            <header className="flex items-center gap-5 mb-14 drop-shadow-xl border-b border-brand-orange/10 pb-6">
              <div className="w-14 h-14 glass-card rounded-2xl flex items-center justify-center border-brand-orange/30">
                <div className="w-4 h-4 border-2 border-brand-orange rounded-full shadow-[0_0_15px_#ff6b00] relative">
                  <div className="absolute inset-0 bg-brand-orange animate-ping rounded-full opacity-75"></div>
                </div>
              </div>
              <div>
                <h1 className="text-3xl font-light tracking-wide text-white">Anti-Gravity Workspace</h1>
                <p className="text-brand-orange/70 font-mono tracking-widest text-xs mt-1 uppercase">System Online • Connection Stable</p>
              </div>
            </header>
            
            {/* Grid Layout */}
            <main className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
              <WeatherCard />
              <FinanceCard />
              <CalendarCard />
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
